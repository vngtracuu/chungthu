<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>TRA CỨU CHỨNG THƯ</title>
  <style>
    body {
      font-family: "Segoe UI", Arial, sans-serif;
      margin: 0;
      padding: 40px;
      color: #333;
      background: #f4f6f9;
    }
    .container {
      max-width: 1000px;
      margin: auto;
      background: #fff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0,0,0,0.15);
    }
    h1 {
      text-align: center;
      margin-bottom: 25px;
      color: #3498db;
      font-weight: bold;
      text-transform: uppercase;
    }
    .input-group {
      display: flex;
      align-items: center;
      margin-bottom: 20px;
    }
    .input-group label {
      font-weight: bold;
      margin-right: 10px;
      color: #2c3e50;
      white-space: nowrap;
    }
    .input-group input {
      flex: 1;
      max-width: 300px;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }
    .button-group {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
    }
    .button-group button {
      flex: 1;
      margin: 0 5px;
      padding: 12px;
      background: #3498db;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }
    .button-group button:hover {
      background: #2980b9;
    }
    .result {
      margin-top: 25px;
    }
    .qr {
      text-align: center;
      margin-bottom: 10px;
    }
    .qr img {
      max-width: 200px;
    }
    .divider {
      border-top: 2px solid #ccc;
      margin: 15px auto;
      width: 60%;
    }
    .doc-title {
      text-align: center;
      font-weight: bold;
      margin: 15px 0;
      color: #2c3e50;
      font-size: 18px;
      letter-spacing: 1px;
    }
    .doc-frame {
      border: 2px solid #bfa46f; /* viền vàng ánh kim */
      border-radius: 10px;
      background: linear-gradient(135deg, #fdfcfb, #e2d1c3); /* luxury gradient */
      padding: 15px;
      box-shadow: 0 4px 12px rgba(191,164,111,0.5); /* ánh vàng sang trọng */
    }
    iframe {
      width: 100%;
      height: 600px;
      border: none;
      background: #fff;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>TRA CỨU CHỨNG THƯ</h1>
    <div class="input-group">
      <label for="docId">Nhập mã chứng thư</label>
      <input type="text" id="docId" placeholder="Ví dụ: CTV26010081">
    </div>
    <div class="button-group">
      <button onclick="quayLai()">QUAY LẠI</button>
      <button onclick="traCuu()">TRA CỨU</button>
      <button onclick="thoat()">THOÁT</button>
    </div>
    <div id="result" class="result"></div>
  </div>

  <script>
    function quayLai() {
      window.history.back();
    }
    function thoat() {
      window.close();
    }
    async function traCuu() {
      const id = document.getElementById('docId').value.trim();
      if (!id) {
        document.getElementById('result').innerHTML = '<p>Vui lòng nhập mã chứng thư</p>';
        return;
      }

      const res = await fetch('/api/docs/' + id);
      if (!res.ok) {
        document.getElementById('result').innerHTML = '<p>Không tìm thấy chứng thư</p>';
        return;
      }
      const doc = await res.json();

      const qrRes = await fetch('/api/qrcode/' + id);
      const qrHtml = await qrRes.text();

      const previewUrl = doc.url.replace('/view', '/preview');

      document.getElementById('result').innerHTML = `
        <div class="qr">${qrHtml}</div>
        <div class="divider"></div>
        <div class="doc-title">${doc.name}</div>
        <div class="doc-frame">
          <iframe src="${previewUrl}" allow="autoplay"></iframe>
        </div>
      `;
    }
  </script>
</body>
</html>
